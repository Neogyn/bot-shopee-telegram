name: Bot Shopee Telegram

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 Brasília
    - cron: '0 10 * * *'  # 07:00
    - cron: '0 11 * * *'  # 08:00
    - cron: '0 12 * * *'  # 09:00
    - cron: '0 13 * * *'  # 10:00
    - cron: '0 14 * * *'  # 11:00
    - cron: '0 15 * * *'  # 12:00
    - cron: '0 16 * * *'  # 13:00
    - cron: '0 17 * * *'  # 14:00
    - cron: '0 18 * * *'  # 15:00
    - cron: '0 19 * * *'  # 16:00
    - cron: '0 20 * * *'  # 17:00
    - cron: '0 21 * * *'  # 18:00
    - cron: '0 22 * * *'  # 19:00
    - cron: '0 23 * * *'  # 20:00
    - cron: '0 0 * * *'   # 21:00
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: 📦 Instalar dependências
        run: pip install -r requirements.txt
      
      - name: 🚀 Executar bot
        run:  python bot_shopee_telegram.py --now
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_SECRET: ${{ secrets.SHOPEE_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
